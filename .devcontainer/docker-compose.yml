version: '3.8'
services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USERNAME: "dev"
        USER_UID: "1000"
        USER_GID: "1000"
    image: devcontainer-env:local
    volumes:
      - ..:/home/dev/workspace:cached
    environment:
      - DEBIAN_FRONTEND=noninteractive
    tty: true
    stdin_open: true

version: "3.8"
services:
  dind:
    image: docker:24-dind
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
    volumes:
      - dind-var-lib-docker:/var/lib/docker
    ports:
      - "2375:2375"
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        USERNAME: "dev"
        USER_UID: "1000"
        USER_GID: "1000"
        BASE_IMAGE: "ubuntu:22.04"
    depends_on:
      - dind
    environment:
      - DOCKER_HOST=tcp://dind:2375
      - DOCKER_TLS_VERIFY=0
    volumes:
      - ..:/home/dev/workspace:cached
    tty: true
    stdin_open: true

volumes:
  dind-var-lib-docker:
