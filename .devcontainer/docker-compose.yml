version: '3.8'
services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USERNAME: "dev"
        USER_UID: "1000"
        USER_GID: "1000"
    image: devcontainer-env:local
    volumes:
      - ..:/home/dev/workspace:cached
    environment:
      - DEBIAN_FRONTEND=noninteractive
    tty: true
    stdin_open: true

